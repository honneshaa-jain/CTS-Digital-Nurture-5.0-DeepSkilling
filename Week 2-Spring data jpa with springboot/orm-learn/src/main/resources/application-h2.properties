# Optional profile for quickly running the app locally without a MySQL server.
# Activate with: --spring.profiles.active=h2
# (ddl-auto=update lets Hibernate create the table automatically; data.sql below seeds it.)

spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:ormlearn
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.sql.init.mode=always
